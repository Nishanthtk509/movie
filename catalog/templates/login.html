<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center px-5">

<div class="w-full max-w-md">

    <div class="backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-8 shadow-2xl">

        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold text-white">
                Welcome Back
            </h1>

            <p class="text-gray-300 mt-2">
                Login to continue
            </p>

        </div>

        {% if error %}
        <div class="mb-5 bg-red-500/20 border border-red-400 text-red-200 rounded-xl px-4 py-3">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="space-y-5">

                <div>

                    <label class="text-gray-300 text-sm">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter username"
                        class="mt-2 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400">

                </div>

                <div>

                    <label class="text-gray-300 text-sm">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        class="mt-2 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-400">

                </div>

                <button
                    class="w-full py-3 rounded-xl bg-cyan-500 hover:bg-cyan-600 text-white font-semibold transition">

                    Login

                </button>

            </div>

        </form>

        

    </div>

</div>

</body>
</html>
