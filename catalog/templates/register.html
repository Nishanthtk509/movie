<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    background:linear-gradient(135deg,#111827,#0f172a,#020617);
}

</style>

</head>

<body class="min-h-screen flex items-center justify-center px-5">

<div class="w-full max-w-lg">

<div class="backdrop-blur-xl bg-white/10 rounded-3xl border border-white/20 p-8 shadow-2xl">

<div class="text-center mb-8">

<h1 class="text-4xl text-white font-bold">
Create Account
</h1>

<p class="text-gray-300 mt-2">
Register to start using the chatbot
</p>

</div>

{% if error %}
<div class="bg-red-500/20 text-red-200 border border-red-400 rounded-xl px-4 py-3 mb-5">
{{ error }}
</div>
{% endif %}

{% if success %}
<div class="bg-green-500/20 text-green-200 border border-green-400 rounded-xl px-4 py-3 mb-5">
{{ success }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="space-y-5">

<div>

<label class="text-gray-300 text-sm">
Username
</label>

<input
type="text"
name="username"
placeholder="Choose username"
class="mt-2 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-white placeholder-gray-400 focus:ring-2 focus:ring-cyan-400 outline-none">

</div>

<div>

<label class="text-gray-300 text-sm">
Password
</label>

<input
type="password"
name="password"
placeholder="Create password"
class="mt-2 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-white placeholder-gray-400 focus:ring-2 focus:ring-cyan-400 outline-none">

</div>

<div>

<label class="text-gray-300 text-sm">
Confirm Password
</label>

<input
type="password"
name="confirm_password"
placeholder="Confirm password"
class="mt-2 w-full rounded-xl bg-white/10 border border-white/20 px-4 py-3 text-white placeholder-gray-400 focus:ring-2 focus:ring-cyan-400 outline-none">

</div>

<button
class="w-full bg-cyan-500 hover:bg-cyan-600 text-white py-3 rounded-xl font-semibold transition">

Create Account

</button>

</div>

</form>

<div class="mt-8 text-center text-gray-300">

Already have an account?

<a href="{% url 'login' %}" class="text-cyan-400 hover:text-cyan-300 font-semibold">
Login
</a>

</div>

</div>

</div>

</body>
</html>
